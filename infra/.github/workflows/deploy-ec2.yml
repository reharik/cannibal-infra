name: Deploy to EC2 (SSM + S3 + OIDC)
on:
  workflow_call:
    inputs:
      deploy_backend:
        type: boolean
        required: false
        default: true
      deploy_frontend:
        type: boolean
        required: false
        default: true
      # Caller: when triggering on push, pass base_sha and head_sha so we detect backend/frontend changes. Example: base_sha: ${{ github.event.before }}, head_sha: ${{ github.sha }}
      base_sha:
        type: string
        required: false
        default: ''
      head_sha:
        type: string
        required: false
        default: ''
    secrets:
      AWS_ROLE_ARN:
        required: true
      # Caller must pass these for backend deploy (or use secrets: inherit)
      POSTGRES_USER:
        required: false
      POSTGRES_PASSWORD:
        required: false
      POSTGRES_DB:
        required: false

permissions:
  contents: read
  id-token: write
env:
  # Keep waits bounded
  SSM_POLL_DELAY_SECONDS: '2'
  SSM_POLL_MAX_ATTEMPTS: '120'

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.decide.outputs.backend_changed }}
      frontend_changed: ${{ steps.decide.outputs.frontend_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so path filter can diff base..ref (e.g. when caller passes base_sha)
          fetch-depth: 0

      - name: Load infra app config
        shell: bash
        run: ./infra/scripts/deploy/load-infra-app-config.sh >> "$GITHUB_ENV"

      # 1) Path-based change detection (push, or workflow_call when caller passes base_sha)
      - name: Path filter
        if: github.event_name == 'push' || (github.event_name == 'workflow_call' && inputs.base_sha != '')
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'push' && github.event.before || inputs.base_sha }}
          ref: ${{ github.event_name == 'push' && github.sha || (inputs.head_sha || github.sha) }}
          filters: |
            backend:
              - 'apps/api/**'
              - 'infra/docker/**'
              - 'infra/config/docker-compose/**'
              - 'infra/scripts/remote/**'
              - 'infra/scripts/deploy/**'
              - 'apps/api/Dockerfile'
            frontend:
              - 'apps/web/**'
              - 'infra/scripts/remote/**'
              - 'infra/scripts/deploy/**'
              - 'apps/web/Dockerfile'
              - 'Caddyfile'
            shared_force_both:
              - '.github/workflows/deploy-ec2.yml'
              - '.github/workflows/**'
              - 'infra/**'

      # 2) Previous-run failure forcing (when we're doing path-based detection)
      - name: Force both if previous run failed
        if: github.event_name == 'push' || (github.event_name == 'workflow_call' && inputs.base_sha != '')
        id: prev_backend
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prev="$(gh run list \
            --workflow "${{ github.workflow }}" \
            --branch "${{ github.ref_name }}" \
            --limit 10 \
            --json databaseId,conclusion \
            | jq -r --arg rid "${{ github.run_id }}" '
                map(select((.databaseId|tostring) != $rid)) | .[0].conclusion // ""
              ')"
          # If you truly want per-job (FE vs BE), you'll need a different approach (see note below).
          if [[ "$prev" == "failure" || "$prev" == "cancelled" ]]; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi

      # 3) Manual overrides (workflow_dispatch)
      - name: Manual inputs (dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: |
          echo "backend=${{ github.event.inputs.deploy_backend }}" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ github.event.inputs.deploy_frontend }}" >> "$GITHUB_OUTPUT"

      # 4) Final decision
      - name: Decide
        id: decide
        shell: bash
        run: |
          backend=false
          frontend=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            backend='${{ steps.manual.outputs.backend }}'
            frontend='${{ steps.manual.outputs.frontend }}'
          elif [[ "${{ github.event_name }}" == "workflow_call" && "${{ steps.filter.outputs.backend }}" == "" ]]; then
            # Called without base_sha: use caller's inputs (default both true)
            backend='${{ inputs.deploy_backend }}'
            frontend='${{ inputs.deploy_frontend }}'
          else
            shared='${{ steps.filter.outputs.shared_force_both || 'false' }}'
            be_changed='${{ steps.filter.outputs.backend || 'false' }}'
            fe_changed='${{ steps.filter.outputs.frontend || 'false' }}'
            force_all='${{ steps.prev_backend.outputs.force || 'false' }}'

            # shared infra/workflow change => force both
            if [[ "$shared" == "true" ]]; then
              backend=true
              frontend=true
            else
              backend="$be_changed"
              frontend="$fe_changed"

              if [[ "$force_all" == "true" ]]; then
                backend=true
                frontend=true
              fi
            fi
          fi

          echo "backend_changed=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$frontend" >> "$GITHUB_OUTPUT"
          echo "Decision: backend=$backend frontend=$frontend"
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.backend_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Load infra app config
        shell: bash
        run: |
          set -euo pipefail
          # ./infra/scripts/deploy/load-infra-app-config.sh >> "$GITHUB_ENV"
          ./infra/scripts/deploy/load-infra-app-config.sh | tee -a "$GITHUB_ENV"
          echo "DEBUG: APP_NAME from GITHUB_ENV is: $(grep '^APP_NAME=' "$GITHUB_ENV" | tail -n1)"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api/Dockerfile
          target: production
          platforms: linux/arm64
          build-args: |
            NODE_VERSION=${{ env.DOCKER_NODE_VERSION }}
            APP_WORKSPACE_PATH=${{ env.DOCKER_API_WORKSPACE_PATH }}
            APP_WORKSPACE_NAME=${{ env.DOCKER_DEV_WORKSPACE }}
            NX_PROJECT_NAME=${{ env.DOCKER_NX_PROJECT }}
          tags: |
            ${{ format('{0}-api:{1}', env.APP_NAME, github.sha) }}
            ${{ format('{0}-api:latest', env.APP_NAME) }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Save Docker image to artifacts/backend.tar.gz
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          docker save "${APP_NAME}-api:${GITHUB_SHA}" "${APP_NAME}-api:latest" | gzip > artifacts/backend.tar.gz

      - name: Package compose files for EC2
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/compose
          cp infra/config/docker-compose/base.yml artifacts/compose/base.yml
          cp infra/config/docker-compose/prod.yml artifacts/compose/prod.yml

      - name: Debug role arn presence
        run: |
          test -n "${{ secrets.AWS_ROLE_ARN }}" && echo "AWS_ROLE_ARN is set" || (echo "AWS_ROLE_ARN missing" && exit 1)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy-Backend
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # - name: Check if backend already uploaded for this SHA
      #   id: check_backend
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     KEY="deployments/${APP_NAME}/${GITHUB_SHA}/backend.tar.gz"
      #     if aws s3 ls "s3://${S3_BUCKET}/${KEY}" --region "${AWS_REGION}" >/dev/null 2>&1; then
      #       echo "skip=true" >> "$GITHUB_OUTPUT"
      #     else
      #       echo "skip=false" >> "$GITHUB_OUTPUT"
      #     fi
      - name: Deploy backend (upload + SSM remote deploy)
        # if: steps.check_backend.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ./infra/scripts/deploy/deploy.sh \
            --app "${APP_NAME}" \
            --env "${ENV_NAME}" \
            --sha "${GITHUB_SHA}" \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --deploy-backend true \
            --deploy-frontend false

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Load infra app config
        shell: bash
        run: ./infra/scripts/deploy/load-infra-app-config.sh >> "$GITHUB_ENV"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set default contact message
        id: default-message
        shell: bash
        run: |
          if [ -z "${{ secrets.VITE_DEFAULT_CONTACT_MESSAGE }}" ]; then
            echo "message=Hi {{firstName}}, just checking in to see how you're doing." >> "$GITHUB_OUTPUT"
          else
            echo "message=${{ secrets.VITE_DEFAULT_CONTACT_MESSAGE }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build frontend
        run: npm run build:web:production
        env:
          VITE_API: /api
          VITE_DEFAULT_INTERVAL_DAYS: ${{ secrets.VITE_DEFAULT_INTERVAL_DAYS || '14' }}
          VITE_DEFAULT_CONTACT_MESSAGE: ${{ steps.default-message.outputs.message }}

      - name: Package frontend to artifacts/frontend.tar.gz
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          tar -czf artifacts/frontend.tar.gz -C apps/web/dist .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy-Frontend
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Check if frontend already uploaded for this SHA
        id: check_frontend
        shell: bash
        run: |
          set -euo pipefail
          KEY="deployments/${APP_NAME}/${GITHUB_SHA}/frontend.tar.gz"
          if aws s3 ls "s3://${S3_BUCKET}/${KEY}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload shared Caddyfile to S3
        if: steps.check_frontend.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Shared proxy config: single source of truth in infra (all known apps)
          aws s3 cp infra/config/caddy/Caddyfile.shared "s3://${S3_BUCKET}/deployments/shared/Caddyfile" --region "${AWS_REGION}"
          # App-specific Caddyfile (optional, for per-app proxy)
          if [ -f Caddyfile ]; then
            aws s3 cp Caddyfile "s3://${S3_BUCKET}/deployments/${APP_NAME}/${GITHUB_SHA}/Caddyfile" --region "${AWS_REGION}"
          fi

      - name: Deploy shared Caddyfile to EC2 (SSM)
        if: steps.check_frontend.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          export APP_NAME ENV="${ENV_NAME}" SHA="${GITHUB_SHA}"
          source ./infra/scripts/deploy/ssm-run.sh
          ssm_run "Deploy shared Caddyfile" ./infra/scripts/remote/deploy-shared-caddyfile.sh

      - name: Deploy frontend (upload + SSM remote deploy)
        if: steps.check_frontend.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ./infra/scripts/deploy/deploy.sh \
            --app "${APP_NAME}" \
            --env "${ENV_NAME}" \
            --sha "${GITHUB_SHA}" \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --deploy-backend false \
            --deploy-frontend true
