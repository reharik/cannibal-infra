# App-owned overlay: merged on EC2 as compose/prod.extend.yml (see infra remote-deploy.sh).
services:
  media-worker:
    platform: linux/arm64
    restart: unless-stopped
    image: ${MEDIA_WORKER_IMAGE:-${APP_NAME}-media-worker:latest}
    env_file:
      - /opt/${APP_NAME}/env/prod.env
    environment:
      NODE_ENV: production
      POSTGRES_PORT: '${POSTGRES_PORT:-5432}'
    depends_on:
      db:
        condition: service_healthy
