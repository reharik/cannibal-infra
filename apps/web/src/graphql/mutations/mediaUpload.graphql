mutation CreateMediaUpload($input: CreateMediaUploadInput!) {
  createMediaUpload(input: $input) {
    data {
      mediaItemId
      status
      uploadInstructions {
        method
        url
        headers {
          key
          value
        }
      }
    }
    errors {
      code
      message
      field
      category
      retryable
    }
  }
}

mutation FinalizeMediaUpload($input: FinalizeMediaUploadInput!) {
  finalizeMediaUpload(input: $input) {
    data {
      mediaItemId
      status
      size
      kind
    }
    errors {
      code
      message
      field
      category
      retryable
    }
  }
}
