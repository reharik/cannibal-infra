query ViewerRecentMedia {
  viewer {
    id
    mediaItems(
      input: {
        collectionInfo: { pageInfo: { limit: 10, offset: 0 }, sortBy: CREATED_AT, sortDir: DESC }
      }
    ) {
      nodes {
        id
        kind
        status
        derivedUrls {
          thumbnail
          display
        }
        mimeType
        title
        description
        originalFileName
        takenAt
        width
        height
        createdAt
      }
      pageInfo {
        limit
        offset
      }
    }
  }
}
