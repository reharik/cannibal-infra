query ViewerAlbumDetail($albumId: ID!) {
  viewer {
    id
    album(id: $albumId) {
      id
      title
      createdAt
      updatedAt
      coverMedia {
        id
        kind
        status
        title
      }
      items(
        input: {
          collectionInfo: {
            pageInfo: { limit: 100, offset: 0 }
            sortBy: CREATED_AT
            sortDir: DESC
          }
        }
      ) {
        nodes {
          id
          mediaItem {
            id
            kind
            status
            title
            createdAt
            width
            height
          }
        }
        pageInfo {
          limit
          offset
        }
      }
    }
  }
}
