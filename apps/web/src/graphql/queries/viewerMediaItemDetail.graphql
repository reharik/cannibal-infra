query ViewerMediaItemDetail($mediaItemId: ID!) {
  viewer {
    mediaItem(id: $mediaItemId) {
      id
      kind
      mimeType
      title
      description
      originalFileName
      createdAt
      takenAt

      displayAsset: asset(kind: DISPLAY) {
        url
      }

      originalAsset: asset(kind: ORIGINAL) {
        mimeType
        width
        height
        fileSizeBytes
      }
    }
  }
}
