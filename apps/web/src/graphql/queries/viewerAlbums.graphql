query ViewerAlbums {
  viewer {
    id
    albums(
      input: {
        collectionInfo: { pageInfo: { limit: 50, offset: 0 }, sortBy: CREATED_AT, sortDir: DESC }
      }
    ) {
      nodes {
        id
        title
        createdAt
        updatedAt
        coverMedia {
          id
          kind
          status
          derivedUrls {
            thumbnail
            display
          }
        }
      }
      pageInfo {
        limit
        offset
      }
    }
  }
}
