type MediaAsset implements Node {
  id: ID!
  kind: MediaAssetKind!
  url: String!
  mimeType: String!
  width: Int
  height: Int
  fileSizeBytes: Int
  status: MediaAssetStatus!
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum MediaAssetKind {
  ORIGINAL
  THUMBNAIL
  DISPLAY
}

enum MediaAssetStatus {
  PENDING
  PROCESSING
  READY
  FAILED
}
