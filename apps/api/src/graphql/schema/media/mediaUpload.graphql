type Mutation {
  createMediaUpload(input: CreateMediaUploadInput!): CreateMediaUploadResponse!
  finalizeMediaUpload(input: FinalizeMediaUploadInput!): FinalizeMediaUploadResponse!
}

input CreateMediaUploadInput {
  kind: MediaKind!
  mimeType: String!
  originalFileName: String
}

type UploadInstructions {
  method: String!
  url: String!
  headers: [UploadHeader!]!
}

type UploadHeader {
  key: String!
  value: String!
}

type CreateMediaUploadResponse {
  data: CreateMediaUploadPayload
  errors: [ContractError!]
}

type CreateMediaUploadPayload {
  mediaItemId: ID!
  status: MediaItemStatus!
  uploadInstructions: UploadInstructions!
}

input FinalizeMediaUploadInput {
  mediaItemId: ID!
}

type FinalizeMediaUploadResponse {
  data: FinalizeMediaUploadPayload
  errors: [ContractError!]
}

type FinalizeMediaUploadPayload {
  mediaItemId: ID!
  status: MediaItemStatus!
  mimeType: String
  size: Int!
  kind: MediaKind!
}
