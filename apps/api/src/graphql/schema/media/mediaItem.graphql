type MediaItem implements Node {
  id: ID!
  kind: MediaKind!
  status: MediaItemStatus!
  asset(kind: MediaAssetKind!): MediaAsset
  assets: [MediaAsset!]!
  mimeType: String!
  sizeBytes: Int!
  originalFileName: String
  width: Int
  height: Int
  durationSeconds: Int
  title: String
  description: String
  takenAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

enum MediaKind {
  PHOTO
  VIDEO
}

enum MediaItemStatus {
  PENDING
  UPLOADED
  PROCESSING
  READY
  FAILED
}
