schema: ./src/graphql/schema/**/*.graphql

generates:
  ./src/graphql/generated/schema.graphql:
    plugins:
      - schema-ast
    config:
      # printSchema() omits custom directives on enum values; AST print preserves them for contracts codegen.
      includeDirectives: true
  ./src/graphql/generated/types.generated.ts:
    plugins:
      - typescript
      - typescript-resolvers
    config:
      scalars:
        DateTime: Date
        Date: Date
      contextType: ../context/types#GraphQLContext
      useIndexSignature: true
      maybeValue: 'T | undefined'
      inputMaybeValue: 'T | undefined'
      enumsAsTypes: true
      mappers:
        Viewer: ../resolvers/parentModels#ViewerParent
        Album: ../../application/readServices/viewerReadServices/viewerAlbumReadService.types#AlbumProjection
        MediaItem: ../../application/readServices/viewerReadServices/viewerMediaItemReadService.types#MediaItemProjection
        AlbumItem: ../../application/readServices/viewerReadServices/viewerAlbumReadService.types#AlbumItemProjection
